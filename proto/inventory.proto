syntax = "proto3";                                                                                                                                  
                                                        
package inventory;

service InventoryService {
    rpc CheckAndReserve (ReserveRequest) returns (ReserveResponse);
}                                                                                                                                                   

message ReserveRequest {                                                                                                                                       
    string item_id = 1;                                 
    int32 quantity = 2;                                                                                                                               
}
                                                                                                                                                    
message ReserveResponse {                                         
    bool reserved = 1;
}